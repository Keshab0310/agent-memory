# Multi-Agent Orchestration Configuration
# Set active_profile to switch all settings at once:
#   opus   — Claude Opus 4.6, 1M context, Max Plan
#   sonnet — Claude Sonnet 4.6, 200K context (default)
#   haiku  — Claude Haiku 4.5, 200K context, cheapest
#   local  — Ollama/LM Studio, no API costs

active_profile: "sonnet"

# ── Profile overrides (these override the profile defaults) ──

orchestrator:
  # Router always uses Haiku regardless of profile (cheap routing)
  router_model: "claude-haiku-4-5-20251001"
  max_concurrent_agents: 5
  max_total_tokens_per_task: 500000

memory:
  sqlite_path: "./data/memory.db"
  chroma_path: "./data/chroma"    # Set to null to disable ChromaDB
  chars_per_token_estimate: 4

cache:
  enabled: true
  system_prompt_breakpoint: true
  shared_context_breakpoint: true

metrics:
  log_file: "./data/metrics.jsonl"
  log_every_call: true

# ── Profile comparison ──
#
# | Setting                   | opus      | sonnet   | haiku    | local    |
# |---------------------------|-----------|----------|----------|----------|
# | Context window            | 1,000,000 | 200,000  | 200,000  | 16,000   |
# | Working memory budget     | 50,000    | 8,000    | 4,000    | 1,500    |
# | Own observations shown    | 20        | 5        | 3        | 3        |
# | Cross-agent obs shown     | 10        | 3        | 2        | 1        |
# | Facts per observation     | 10        | 3        | 2        | 2        |
# | Narrative char limit      | 1,000     | 200      | 100      | 100      |
# | Condensation threshold    | 25        | 5        | 3        | 3        |
# | Researcher output tokens  | 8,000     | 2,000    | 1,000    | 1,024    |
# | Coder output tokens       | 16,000    | 4,096    | 2,000    | 1,024    |
# | RPM limit                 | 100       | 50       | 100      | 999      |
# | TPM limit                 | 400,000   | 80,000   | 200,000  | 999,999  |
# | Cost/1M input tokens      | $15.00    | $3.00    | $0.80    | $0.00    |
# | Cost/1M output tokens     | $75.00    | $15.00   | $4.00    | $0.00    |
